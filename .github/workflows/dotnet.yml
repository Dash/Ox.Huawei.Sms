# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

permissions:
  contents: write

on:
  push:
    branches: [ "master" ]
    tags: [ '*' ]
  workflow_dispatch: {}
        
env:
  VERSION: 1.0.0


jobs:
  linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Archive
      run: git archive --format=tgz --prefix="ox.huawei.sms-${VERSION}/" --output=ox.huawei.sms_${VERSION}.tar.gz HEAD
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build Linux self-contained
      run: |
        dotnet publish Ox.Huawei.Sms.Monitor/Ox.Huawei.Sms.Monitor.csproj -c Release -p:DebugSymbols=false -p:PublishProfile=LinuxSelfContained -o ./publish-linuxselfcontained
        dotnet publish Ox.Huawei.Sms.SendCli/Ox.Huawei.Sms.SendCli.csproj -c Release -p:DebugSymbols=false -p:PublishProfile=LinuxSelfContained -o ./publish-linuxselfcontained
        dotnet publish Ox.Huawei.Sms.Monitor -c Release -o portable -p:UseAppHost=false --no-self-contained -p:PublishAot=false -p:PublishSingleFile=false -p:PublishTrimmed=false
        dotnet publish Ox.Huawei.Sms.SendCli/Ox.Huawei.Sms.SendCli.csproj -c Release -o portable -p:UseAppHost=false --no-self-contained -p:PublishAot=false -p:PublishSingleFile=false -p:PublishTrimmed=false
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v6.0.0
      with:
        # Artifact name
        name: linux-selfcontained
        # A file, directory or wildcard pattern that describes what to upload
        path: publish-linuxselfcontained/**
        # The desired behavior if no files are found using the provided path.
    - name: Upload a Source Archive
      uses: actions/upload-artifact@v6.0.0
      with:
        # Artifact name
        name: source
        # A file, directory or wildcard pattern that describes what to upload
        path: ox.huawei.sms_${{ env.VERSION }}.tar.gz
        # The desired behavior if no files are found using the provided path.
    - name: Upload portable Build Artifact
      uses: actions/upload-artifact@v6.0.0
      with:
        # Artifact name
        name: portable
        # A file, directory or wildcard pattern that describes what to upload
        path: portable/**
        # The desired behavior if no files are found using the provided path.
    - name: RPM Build
      run: |
        sudo apt-get install -y rpm
        mkdir -p ~/rpmbuild/SOURCES
        cp ox.huawei.sms_${VERSION}.tar.gz ~/rpmbuild/SOURCES/
        rpmbuild -bb rpm/Ox.Huawei.Sms.spec --define "release ${GITHUB_RUN_NUMBER}" --define "commit ${GITHUB_SHA}"
    - name: Prepare artefacts
      run: |
        TAG="v${VERSION}-${GITHUB_RUN_NUMBER}"
        mkdir artefacts
        cp -a ox.huawei.sms_${VERSION}.tar.gz artefacts/ox.huawei.sms_${VERSION}-source.tar.gz
        cp -a ~/rpmbuild/RPMS/**/*.rpm artefacts/
        (cd publish-linuxselfcontained && tar -zcvf ../artefacts/ox.huawei.sms_${VERSION}.linux64.tgz *)
        (cd portable && zip -rv -9 -o ../artefacts/ox.huawei.sms_${VERSION}.zip .)
    - name: Upload a RPM
      uses: actions/upload-artifact@v6.0.0
      with:
        # Artifact name
        name: rpm
        # A file, directory or wildcard pattern that describes what to upload
        path: ~/rpmbuild/RPMS/**/*.rpm
        # The desired behavior if no files are found using the provided path.
    - name: Create release
      if: github.ref_name == 'master'
      env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="v${VERSION}-${GITHUB_RUN_NUMBER}"
        gh release create "$TAG" artefacts/* \
          --draft \
          --title "Ox.Huawei.Sms.Monitor ${VERSION}" \
          --generate-notes

              

  windows:

    runs-on: windows-latest
    needs: linux

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build Windows
      run: |
        dotnet publish Ox.Huawei.Sms.Monitor/Ox.Huawei.Sms.Monitor.csproj -c Release -p:DebugSymbols=false -p:PublishProfile=WindowsSelfContained -o ./publish-windowsselfcontained
        dotnet publish Ox.Huawei.Sms.SendCli/Ox.Huawei.Sms.SendCli.csproj -c Release -p:DebugSymbols=false -p:PublishProfile=WindowsSelfContained -o ./publish-windowsselfcontained
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v6.0.0
      with:
        # Artifact name
        name: windows-selfcontained
        # A file, directory or wildcard pattern that describes what to upload
        path: publish-windowsselfcontained/**
        # The desired behavior if no files are found using the provided path.
    - name: Update release
      if: github.ref_name == 'master'
      env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $TAG="v${Env:VERSION}-${Env:GITHUB_RUN_NUMBER}"
        mkdir artefacts
        cd publish-windowsselfcontained
        7z a ..\artefacts\ox.huawei.sms_${Env:VERSION}-win64.zip *
        cd ..
        gh release upload "${TAG}" artefacts/* --clobber
